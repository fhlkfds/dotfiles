$mainMod = SUPER

# Hyrpland
bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Return, exec, $scriptsDir/Dropterminal.sh kitty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exit,
#bind = $mainMod, L, exec, hyprlock
bind = SUPER, L, exec, $ipc lockScreen lock
# Helper scripts
bindd = $mainMod ALT, E, emoji menu, exec, $scriptsDir/RofiEmoji.sh 
bindd = $mainMod, H, help / cheat sheet, exec, $scriptsDir/KeyHints.sh
bindd = $mainMod ALT, V, clipboard manager, exec, /home/liam/.config/hypr/scripts/clipboard.sh
# Move active window to workspace and follow it
# code:10-19 = physical number keys 1-0
bindd = $mainMod SHIFT, code:10, move to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, code:11, move to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, code:12, move to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, code:13, move to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, code:14, move to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, code:15, move to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, code:16, move to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, code:17, move to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, code:18, move to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, code:19, move to workspace 10, movetoworkspace, 10
bindd = $mainMod SHIFT, bracketleft, move to previous workspace, movetoworkspace, -1
bindd = $mainMod SHIFT, bracketright, move to next workspace, movetoworkspace, +1

# Move active window to workspace silently
bindd = $mainMod CTRL, code:10, move silently to workspace 1, movetoworkspacesilent, 1
bindd = $mainMod CTRL, code:11, move silently to workspace 2, movetoworkspacesilent, 2
bindd = $mainMod CTRL, code:12, move silently to workspace 3, movetoworkspacesilent, 3
bindd = $mainMod CTRL, code:13, move silently to workspace 4, movetoworkspacesilent, 4
bindd = $mainMod CTRL, code:14, move silently to workspace 5, movetoworkspacesilent, 5
bindd = $mainMod CTRL, code:15, move silently to workspace 6, movetoworkspacesilent, 6
bindd = $mainMod CTRL, code:16, move silently to workspace 7, movetoworkspacesilent, 7
bindd = $mainMod CTRL, code:17, move silently to workspace 8, movetoworkspacesilent, 8
bindd = $mainMod CTRL, code:18, move silently to workspace 9, movetoworkspacesilent, 9
bindd = $mainMod CTRL, code:19, move silently to workspace 10, movetoworkspacesilent, 10
bindd = $mainMod CTRL, bracketleft, move silently to previous workspace, movetoworkspacesilent, -1
bindd = $mainMod CTRL, bracketright, move silently to next workspace, movetoworkspacesilent, +1

# Fullscreen active window
bind = SUPER SHIFT, F, fullscreen, 1

## Programs
bind = $mainMod, E, exec, nautilus
bind = $mainMod, A, exec, rofi -show drun -theme ~/.config/rofi/comet-glass.rasi
bind = $mainMod, W, exec, brave
bind = $mainMod, S, exec, spotify
bind = $mainMod, O, exec, obsidian

## Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9



# Extra
# Desktop zoom / magnifier
bindd = $mainMod ALT, mouse_down, Zoom in, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bindd = $mainMod ALT, mouse_up, Zoom out, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

# Reset zoom
bindd = $mainMod ALT SHIFT, mouse_down, Reset zoom, exec, hyprctl -q keyword cursor:zoom_factor 1
bindd = $mainMod ALT SHIFT, mouse_up, Reset zoom, exec, hyprctl -q keyword cursor:zoom_factor 1


# Volume
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Media playback
bind  = , XF86AudioPlay,        exec, playerctl play-pause
bind  = , XF86AudioPause,       exec, playerctl pause
bind  = , XF86AudioNext,        exec, playerctl next
bind  = , XF86AudioPrev,        exec, playerctl previous
bind  = , XF86AudioStop,        exec, playerctl stop

# Screen brightness
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Resize windows
binded = $mainMod SHIFT, left, resize left (-50), resizeactive, -50 0
binded = $mainMod SHIFT, right, resize right (+50), resizeactive, 50 0
binded = $mainMod SHIFT, up, resize up (-50), resizeactive, 0 -50
binded = $mainMod SHIFT, down, resize down (+50), resizeactive, 0 50

# Move windows
bindd = $mainMod CTRL, left, move window left, movewindow, l
bindd = $mainMod CTRL, right, move window right, movewindow, r
bindd = $mainMod CTRL, up, move window up, movewindow, u
bindd = $mainMod CTRL, down, move window down, movewindow, d

# Swap windows
bindd = $mainMod ALT, left, swap window left, swapwindow, l
bindd = $mainMod ALT, right, swap window right, swapwindow, r
bindd = $mainMod ALT, up, swap window up, swapwindow, u
bindd = $mainMod ALT, down, swap window down, swapwindow, d

# Move focus with mainMod + arrow keys
bindd = $mainMod, left, focus left, movefocus, l
bindd = $mainMod, right, focus right, movefocus, r
bindd = $mainMod, up, focus up, movefocus, u
bindd = $mainMod, down, focus down, movefocus, d
# Drag window with Win + Shift + Left Mouse
bindm = SUPER, mouse:272, movewindow

# Resize window with Win + Shift + Right Mouse
bindm = SUPER SHIFT, mouse:273, resizewindow
