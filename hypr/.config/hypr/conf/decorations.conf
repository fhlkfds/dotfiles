# ~/.config/hypr/decorations.conf

general {
    border_size = 2
    gaps_in = 6
    gaps_out = 12
    float_gaps = 12

    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244ff)
}

decoration {
    rounding = 10
    rounding_power = 3.0

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        ignore_opacity = true
        new_optimizations = true
        xray = false
        noise = 0.01
        contrast = 0.95
        brightness = 0.82
        vibrancy = 0.18
    }
}
